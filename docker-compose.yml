version: "3.9"

services:
  backend:
    build: ./backend
    container_name: agrosmart-api
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=django-docker-secret-key-change-in-prod
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:80
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - backend-data:/app/db.sqlite3
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: agrosmart-web
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
